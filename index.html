<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Onyx SDI</title>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/silhouette.css" />
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-logo">
      ONYX <span class="accent">SDI</span>
      <span class="app-subtitle">Smart Drill Indicator</span>
    </div>

    <div class="header-right">
      <div class="bt-status">
        <span class="bt-dot disconnected" id="bt-dot"></span>
        <span id="bt-label" style="font-size:10px;letter-spacing:.1em;">BT</span>
      </div>

      <button class="btn-icon" id="btn-bt" title="Bluetooth 연결">
        <!-- Bluetooth icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
          <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
        </svg>
      </button>

      <button class="btn-icon" id="btn-theme" title="테마 전환">
        <!-- Sun/Moon icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Tab navigation ─────────────────────────────────── -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="live">LIVE</button>
    <button class="tab-btn" data-tab="training">TRAINING</button>
    <button class="tab-btn" data-tab="config">CONFIG</button>
    <button class="tab-btn" data-tab="log">LOG</button>
  </nav>

  <!-- ── Tab panels (JS populates these) ───────────────── -->
  <div id="tab-live"     class="tab-panel active"></div>
  <div id="tab-training" class="tab-panel"></div>
  <div id="tab-config"   class="tab-panel"></div>
  <div id="tab-log"      class="tab-panel"></div>

</div><!-- /#app -->

<!-- Scripts (load order = dependency order) -->
<script src="js/constants.js"></script>
<script src="js/store.js"></script>
<script src="js/audio.js"></script>
<script src="js/bluetooth.js"></script>
<script src="js/alert.js"></script>
<script src="js/session.js"></script>
<script src="js/tabs/live.js"></script>
<script src="js/tabs/training.js"></script>
<script src="js/tabs/config.js"></script>
<script src="js/tabs/log.js"></script>
<script src="js/main.js"></script>
</body>
</html>
